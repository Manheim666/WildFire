name: Daily update and deploy dashboard

on:
  schedule:
    - cron: "0 4 * * *"   # Every day at 08:00 Azerbaijan time
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-dashboard-update
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Git LFS and pull files
        run: |
          git lfs install
          git lfs pull

      - name: Debug docs before pipeline
        run: |
          echo "Current commit before pipeline:"
          git rev-parse HEAD

          echo "Current branch:"
          git branch --show-current

          echo "Remote:"
          git remote -v

          echo "First 30 lines of docs/index.html before pipeline:"
          head -30 docs/index.html || true

          echo "Checking for LFS pointers before pipeline:"
          grep -R "version https://git-lfs.github.com/spec/v1" -n docs || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skipping dependency install"
          fi

      - name: Register Jupyter kernel
        run: |
          python -m pip install ipykernel nbconvert jupyter
          python -m ipykernel install --user --name python3 --display-name "Python 3"
          jupyter kernelspec list

      - name: Run wildfire pipeline
        env:
          CI: true
          GITHUB_ACTIONS: true
          SKIP_GEE_AUTH: true
        run: |
          python run_pipeline.py

      - name: Validate docs after pipeline
        run: |
          echo "Checking docs after pipeline..."

          if [ ! -f docs/index.html ]; then
            echo "ERROR: docs/index.html does not exist"
            exit 1
          fi

          echo "First 40 lines of docs/index.html after pipeline:"
          head -40 docs/index.html

          echo "Searching for LFS pointers inside docs:"
          if grep -R "version https://git-lfs.github.com/spec/v1" -n docs; then
            echo "ERROR: Git LFS pointer found inside docs/"
            echo "GitHub Pages would deploy broken pointer files."
            exit 1
          else
            echo "OK: No LFS pointer files found inside docs/"
          fi

      - name: Commit updated dashboard files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs dashboard/data || true

          if git diff --cached --quiet; then
            echo "No dashboard changes to commit"
          else
            git commit -m "Daily dashboard update"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Debug final deployed files
        run: |
          echo "Current commit:"
          git rev-parse HEAD

          echo "First 40 lines of docs/index.html:"
          head -40 docs/index.html

          echo "All LFS pointers inside docs:"
          grep -R "version https://git-lfs.github.com/spec/v1" -n docs || true

          echo "Docs file sizes:"
          find docs -maxdepth 2 -type f -exec ls -lh {} \;

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
